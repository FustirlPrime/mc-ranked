
<style>
.outer {
  background: #06000c;
  padding: 52px 40px;
  border-radius: 6px;
  position: relative;
  overflow: hidden;
}
.logo-row {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 2;
  gap: 0;
}
.lw { position: relative; display: inline-block; line-height: 1; }
.base {
  font-family: 'Arial Black', Impact, Arial, sans-serif;
  font-size: 108px;
  font-weight: 900;
  letter-spacing: -3px;
  display: inline-block;
  line-height: 1;
  font-style: italic;
}

/* QUARTZ: solid white base + hard shadow stack going upper-right */
.qb {
  color: #f6f2ea;
  text-shadow:
     1px -1px 0 #e8e4da,
     2px -2px 0 #d8d4ca,
     3px -3px 0 #c8c4ba,
     4px -4px 0 #b8b4aa,
     5px -5px 0 #a8a49a,
     6px -6px 0 #98948a,
     7px -7px 0 #88847a,
     8px -8px 0 #78746a,
     9px -9px 0 #68645a,
    10px -10px 0 #585448,
    11px -11px 0 #484438,
    12px -12px 0 #383428,
    13px -13px 0 #282418,
    14px -14px 0 #18140a;
}
/* Crystal gradient overlay on front face */
.qc {
  position: absolute; top: 0; left: 0;
  background: linear-gradient(155deg,
    #ffffff   0%,
    #faf6ee  12%,
    #eeeadf  28%,
    #d8d5cd  50%,
    #c5c2bc  70%,
    #b0ada8 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  pointer-events: none;
}

/* AMETHYST: solid purple base + hard shadow stack */
.ab {
  color: #d870ff;
  text-shadow:
     1px -1px 0 #c860ef,
     2px -2px 0 #b850df,
     3px -3px 0 #a840cf,
     4px -4px 0 #9830bf,
     5px -5px 0 #8820af,
     6px -6px 0 #78109f,
     7px -7px 0 #68008f,
     8px -8px 0 #58007e,
     9px -9px 0 #48006e,
    10px -10px 0 #38005e,
    11px -11px 0 #28004e,
    12px -12px 0 #18003e,
    13px -13px 0 #0e002e,
    14px -14px 0 #08001e;
}
/* Amethyst crystal gradient */
.ac {
  position: absolute; top: 0; left: 0;
  background: linear-gradient(155deg,
    #fce4ff   0%,
    #ec9fff  12%,
    #d870ff  28%,
    #b848e8  50%,
    #9020c8  72%,
    #6808a8 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  pointer-events: none;
}
</style>

<div class="outer">

<!-- Sparkles SVG -->

  <polygon points="42,108 44,116 42,124 40,116" fill="#f0ece2" opacity="0.6"/>

  <polygon points="658,27 667,29 658,31 649,29"  fill="#d888ff" opacity="0.5"/>
  <polygon points="620,110 622,118 620,126 618,118" fill="#c060ef" opacity="0.7"/>

<div class="logo-row">
  <!-- MC in QUARTZ -->
  <div class="lw">
    <span class="base qb">MC</span>
    <span class="base qc">MC</span>
  </div>
  <!-- RANKED in AMETHYST -->
  <div class="lw">
    <span class="base ab">RANKED</span>
    <span class="base ac">RANKED</span>

</div>

</div>
